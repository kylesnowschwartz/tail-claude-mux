name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: "Run: `git -C ~/.tmux/plugins/opensessions describe --tags`"
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: mux
    attributes:
      label: Terminal multiplexer
      options:
        - tmux
        - zellij
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug logs
      description: "Paste relevant logs from `/tmp/opensessions-debug.log`"
      render: text
