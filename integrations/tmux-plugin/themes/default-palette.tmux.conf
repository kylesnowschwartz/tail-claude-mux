# tcm tmux palette — vendored fallback (catppuccin-mocha).
#
# This file is sourced by tcm.tmux as the default palette before
# ~/.config/tcm/palette-active.tmux.conf takes precedence. Once the bun
# server has booted at least once, the active file is the canonical source
# and this one is only used as a first-ever-attach safety net.
#
# Token list mirrors PALETTE_TOKENS in
#   packages/runtime/src/server/tmux-header-sync.ts
# and the values mirror CATPPUCCIN_MOCHA in packages/runtime/src/themes.ts.
# Keep them in lockstep — the runtime's default theme is the right fallback
# because cold-start before a theme has been chosen lands on that theme.
#
# `-gq` sets each option globally and silently (no error if already set).
set -gq @tcm-thm-base     "#1e1e2e"
set -gq @tcm-thm-text     "#cdd6f4"
set -gq @tcm-thm-blue     "#89b4fa"
set -gq @tcm-thm-surface0 "#313244"
set -gq @tcm-thm-surface2 "#585b70"
set -gq @tcm-thm-overlay0 "#6c7086"
set -gq @tcm-thm-yellow   "#f9e2af"
set -gq @tcm-thm-red      "#f38ba8"
set -gq @tcm-thm-green    "#a6e3a1"

# Statusline glyphs — never vary by theme; the active palette file rewrites
# them with the same values for consistency. nf-cod-terminal (U+EA85) for
# "no agent in this window"; nf-md-arrow_u_left_top (U+F17B3) for the
# most-recently-visited window marker. Both require a Nerd Font; users
# without one see tofu in those slots — acceptable degraded mode.
set -gq @tcm-shell-glyph        ""
set -gq @tcm-last-window-glyph  "󱞳"
